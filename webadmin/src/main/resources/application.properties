server.port=${PORT:8080}
logging.level.org.atmosphere = warn

# Tulospalvelu data directory (contains KILP.DAT and laskenta.cfg)
# If empty, auto-detects from common paths relative to working directory
tulospalvelu.data-dir=
# Connection index from laskenta.cfg (e.g. 3 for yhteys3). 0 = auto-detect first emit connection
tulospalvelu.connection-index=0

