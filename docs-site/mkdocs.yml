site_name: Pekka Pirilän tulospalveluohjelmat
site_description: Vanhojen tulospalveluohjelmien (HkKisaWin, ViestiWin, HkMaali)
  käyttöohjeet, tuotu alkuperäisiltä sivuilta markdown-muotoon.
site_url: https://pirilatp.github.io/tulospalvelu/
repo_url: https://github.com/PirilaTP/tulospalvelu
repo_name: PirilaTP/tulospalvelu
edit_uri: edit/main/docs-site/docs/

theme:
  name: material
  language: fi
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Vaihda tummaan teemaan
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Vaihda vaaleaan teemaan
  icon:
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details

plugins:
  - search:
      lang: fi

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/PirilaTP/tulospalvelu


